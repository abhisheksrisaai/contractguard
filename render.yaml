# ── ContractGuard — Render Blueprint ───────────────────────────
# Render auto-detects this file when you connect your GitHub repo.
# See instructions below for manual setup via Render dashboard.

services:
  # ── FastAPI Backend (Web Service) ──────────────────────────────
  - name: contractguard-api
    type: web
    runtime: docker
    repo: https://github.com/abhisheksrisaai/contractguard
    branch: main
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      # ── LLM Provider ────────────────────────────────────────
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      # ── Qdrant (local mode — runs inside backend container) ─
      - key: QDRANT_MODE
        value: local
      - key: QDRANT_HOST
        value: localhost
      - key: QDRANT_PORT
        value: "6333"
      - key: QDRANT_LOCAL_PATH
        value: /app/qdrant_data
      # ── Application ─────────────────────────────────────────
      - key: APP_DEBUG
        value: false
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      # ── CORS (update after Vercel deploy) ──────────────────
      - key: FRONTEND_URL
        value: https://contractguard.vercel.app

  # ── Qdrant Private Service ────────────────────────────────────
  - name: contractguard-qdrant
    type: pserv
    runtime: docker
    repo: https://github.com/abhisheksrisaai/contractguard
    branch: main
    dockerfilePath: ./backend/Dockerfile.qdrant
    plan: free
    disk:
      name: qdrant-data
      mountPath: /qdrant/storage
      sizeGB: 1
